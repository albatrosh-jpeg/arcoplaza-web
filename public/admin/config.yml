backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: public/blog
public_folder: /blog

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Título
        name: title
        widget: string
      - label: Slug
        name: slug
        widget: string
        hint: Mantener estable para conservar la URL /blog/:slug.
      - label: Categoría
        name: category
        widget: select
        options:
          - Facturas
          - Mercado
          - Empresas
          - Comunidades
          - Casos reales
      - label: Excerpt
        name: excerpt
        widget: text
      - label: Fecha visible
        name: date
        widget: string
        hint: Ejemplo: Junio 2026.
      - label: Fecha de publicación
        name: datePublished
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Tiempo de lectura
        name: readTime
        widget: string
        hint: Ejemplo: 6 min.
      - label: Imagen destacada
        name: image
        widget: image
      - label: ALT de imagen destacada
        name: imageAlt
        widget: string
      - label: Featured
        name: featured
        widget: boolean
        default: false
      - label: SEO Title
        name: seoTitle
        widget: string
      - label: SEO Description
        name: seoDescription
        widget: text
      - label: Contenido del artículo
        name: body
        widget: markdown
        hint: Para captions usa la sintaxis ![ALT](/blog/imagen.png "Caption").
